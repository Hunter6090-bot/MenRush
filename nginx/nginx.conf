events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  upstream backend {
    server backend:3000;
  }

  server {
    listen 80;

    # Only profile avatars are public. Album and message media are authorized
    # by the backend using short-lived, viewer-bound grants.
    location /uploads/profiles/ {
      alias /var/www/uploads/profiles/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to the backend
    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
