version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nearnow-db
    environment:
      POSTGRES_USER: nearnow
      POSTGRES_PASSWORD: nearnow123
      POSTGRES_DB: nearnow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nearnow']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nearnow-backend
    environment:
      DATABASE_URL: postgresql://nearnow:nearnow123@postgres:5432/nearnow
      JWT_SECRET: your-secret-jwt-key-change-in-production
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

volumes:
  postgres_data:
