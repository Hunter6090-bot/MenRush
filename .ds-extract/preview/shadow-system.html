<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows & glows" subtitle="Deep-warm card / hover / modal / copper glow" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadow & glow system</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--nn-bg); color: var(--nn-text); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .box { aspect-ratio: 1/1; background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 16px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .name { font: var(--nn-overline); letter-spacing: 0.16em; font-size: 10px; }
  .val { font: var(--nn-mono); color: var(--nn-muted); font-size: 10px; margin-top: 3px; }
  .copper-box { background: var(--nn-copper); border-color: transparent; color: #1A0E03; }
</style>
</head>
<body>
  <div class="grid">
    <div class="box" style="box-shadow: 0 4px 24px rgba(0,0,0,0.55)"><span class="name">SHADOW-CARD</span><span class="val">default rest</span></div>
    <div class="box" style="box-shadow: 0 16px 48px rgba(0,0,0,0.75)"><span class="name">CARD-HOVER</span><span class="val">on hover/focus</span></div>
    <div class="box" style="box-shadow: 0 24px 80px rgba(0,0,0,0.85)"><span class="name">MODAL</span><span class="val">drawer/modal</span></div>
    <div class="box copper-box" style="box-shadow: 0 0 28px rgba(196,131,42,0.35)"><span class="name" style="color:#1A0E03">GLOW-COPPER</span><span class="val" style="color:rgba(26,14,3,.6)">CTA / pulse</span></div>
  </div>
</body>
</html>
