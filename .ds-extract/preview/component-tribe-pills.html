<!doctype html>
<!-- @dsCard group="Components" name="Tribe & mood pills" subtitle="Multi-select identity / intent tags" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tribe & mood pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px; background: var(--nn-bg); color: var(--nn-text); display: flex; flex-direction: column; gap: 14px; }
  .lbl { font: var(--nn-overline); letter-spacing: 0.16em; font-size: 10px; color: var(--nn-muted); margin-bottom: 4px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 7px 14px; border-radius: 999px; font: var(--nn-caption); font-size: 12px; border: 1px solid var(--nn-border); background: rgba(196,131,42,.06); color: var(--nn-text); cursor: pointer; }
  .pill.on { background: var(--nn-copper); color: #1A0E03; border-color: transparent; font-weight: 600; box-shadow: var(--nn-glow-copper); }
  .pill.muted { color: var(--nn-muted); }
</style>
</head>
<body>
  <div>
    <div class="lbl">TRIBES</div>
    <div class="row">
      <span class="pill on">Bear</span>
      <span class="pill on">Leather</span>
      <span class="pill">Daddy</span>
      <span class="pill">Jock</span>
      <span class="pill">Otter</span>
      <span class="pill">Twink</span>
      <span class="pill muted">+ 6 more</span>
    </div>
  </div>
  <div>
    <div class="lbl">MOOD · WHAT FOR</div>
    <div class="row">
      <span class="pill on">NSA</span>
      <span class="pill">Drinks</span>
      <span class="pill">Chat</span>
      <span class="pill">Date</span>
      <span class="pill">Hookup</span>
    </div>
  </div>
</body>
</html>
