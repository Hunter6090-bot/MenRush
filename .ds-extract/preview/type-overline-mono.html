<!doctype html>
<!-- @dsCard group="Type" name="Overline · button · mono" subtitle="Tracked caps, button casing, mono geo labels" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Overline · button · mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--nn-bg); color: var(--nn-text); }
  .row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-top: 1px dashed var(--nn-border); }
  .row:first-of-type { border-top: none; }
  .tag { font: var(--nn-mono); font-size: 11px; color: var(--nn-muted); min-width: 92px; }
  .overline { font: var(--nn-overline); color: var(--nn-copper); text-transform: uppercase; letter-spacing: 0.18em; }
  .btn-label { font: var(--nn-button); text-transform: uppercase; letter-spacing: 0.14em; text-indent: 0.14em; height: 40px; padding: 0 22px; border-radius: 999px; background: var(--nn-copper); color: #1A0E03; box-shadow: var(--nn-glow-copper); display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .mono { font: var(--nn-mono); color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="row"><span class="tag">overline</span><span class="overline">PULSE FOR NOW</span></div>
  <div class="row"><span class="tag">button</span><span class="btn-label">GO VISIBLE</span></div>
  <div class="row"><span class="tag">mono · 13</span><span class="mono">lat 40.7589 · lng −73.9851 · r 3mi</span></div>
</body>
</html>
