<!doctype html>
<!-- @dsCard group="Components" name="Pulse FAB" subtitle="The signature copper radar button" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pulse FAB</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--nn-bg); color: var(--nn-text); display: flex; gap: 36px; align-items: center; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .lbl { font: var(--nn-overline); letter-spacing: 0.16em; font-size: 10px; color: var(--nn-muted); }
  .fab-wrap { position: relative; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; inset: 18px; border-radius: 50%; background: var(--nn-copper); }
  .r1 { opacity: .5; animation: nn-radar 2.4s var(--nn-ease-out) infinite; }
  .r2 { opacity: .35; animation: nn-radar 2.4s var(--nn-ease-out) .8s infinite; }
  .r3 { opacity: .2; animation: nn-radar 2.4s var(--nn-ease-out) 1.6s infinite; }
  .fab { position: relative; z-index: 2; width: 72px; height: 72px; border-radius: 50%; background: radial-gradient(circle at 30% 25%, #E8B564, #C4832A 55%, #8B4513 100%); display: flex; align-items: center; justify-content: center; box-shadow: var(--nn-shadow-card), var(--nn-glow-copper-strong), inset 0 1px 0 rgba(255,220,170,.4); border: 1px solid rgba(255,200,130,.2); }
  .fab svg { width: 32px; height: 32px; color: #1A0E03; }
  .fab.off { background: var(--nn-elevated); border: 1px solid var(--nn-border); box-shadow: var(--nn-shadow-card); }
  .fab.off svg { color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="col">
    <div class="fab-wrap">
      <span class="ring r1"></span>
      <span class="ring r2"></span>
      <span class="ring r3"></span>
      <div class="fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="10"/></svg>
      </div>
    </div>
    <span class="lbl">PULSING · VISIBLE</span>
  </div>
  <div class="col">
    <div class="fab-wrap">
      <div class="fab off">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="10"/></svg>
      </div>
    </div>
    <span class="lbl">INVISIBLE</span>
  </div>
</body>
</html>
