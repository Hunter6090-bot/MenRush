<!doctype html>
<!-- @dsCard group="Components" name="Map markers" subtitle="Self (pulsing) + nearby avatars on radar grid" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Map pins</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--nn-bg); color: var(--nn-text); display: flex; justify-content: center; align-items: center; min-height: 280px; }
  .map { width: 100%; height: 280px;
         background:
           radial-gradient(circle at 50% 50%, rgba(196,131,42,.06), transparent 60%),
           linear-gradient(180deg, #1A1106, #0D0A06);
         position: relative; overflow: hidden; }
  .map::before {
    content: ''; position: absolute; inset: -20px;
    background-image:
      linear-gradient(rgba(61,43,14,.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,43,14,.5) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
  }
  .pin { position: absolute; transform: translate(-50%, -50%); }
  .self { left: 50%; top: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
  .self .r { position: absolute; inset: 0; border-radius: 50%; background: var(--nn-copper); }
  .self .r1 { opacity: .5; animation: nn-radar 2.4s var(--nn-ease-out) infinite; }
  .self .r2 { opacity: .35; animation: nn-radar 2.4s var(--nn-ease-out) .8s infinite; }
  .self .r3 { opacity: .2; animation: nn-radar 2.4s var(--nn-ease-out) 1.6s infinite; }
  .self .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--nn-copper); border: 2.5px solid var(--nn-text); box-shadow: 0 0 18px rgba(196,131,42,.7); z-index: 2; }

  .other { width: 42px; height: 42px; }
  .other .av { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(160deg,#3D2B0E,#1E1508); border: 2px solid var(--nn-copper); display: flex; align-items: center; justify-content: center; font: var(--nn-h4); color: var(--nn-text); box-shadow: 0 0 0 3px rgba(196,131,42,.2), var(--nn-shadow-card); }
  .other .v { position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; border-radius: 50%; background: var(--nn-copper); border: 2px solid var(--nn-bg); display: flex; align-items: center; justify-content: center; }
  .other .v svg { width: 8px; height: 8px; color: #1A0E03; }
  .lbl { position: absolute; left: 16px; top: 14px; font: var(--nn-overline); font-size: 9.5px; letter-spacing: 0.18em; color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="map">
    <span class="lbl">3 MILE RADIUS · 3 ACTIVE</span>
    <div class="pin self">
      <span class="r r1"></span><span class="r r2"></span><span class="r r3"></span>
      <span class="dot"></span>
    </div>
    <div class="pin other" style="left:28%; top:38%"><div class="av">M</div><div class="v"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg></div></div>
    <div class="pin other" style="left:70%; top:30%"><div class="av">D</div></div>
    <div class="pin other" style="left:65%; top:72%"><div class="av">R</div><div class="v"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg></div></div>
  </div>
</body>
</html>
