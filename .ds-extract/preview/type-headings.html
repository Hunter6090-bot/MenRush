<!doctype html>
<!-- @dsCard group="Type" name="Headings — Inter" subtitle="H1–H4, 28→16px, weights 600–800" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Headings — Inter</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--nn-bg); color: var(--nn-text); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-top: 1px dashed var(--nn-border); }
  .row:first-of-type { border-top: none; }
  .tag { font: var(--nn-mono); font-size: 11px; color: var(--nn-muted); min-width: 78px; }
  .h1 { font: var(--nn-h1); letter-spacing: -0.01em; }
  .h2 { font: var(--nn-h2); letter-spacing: -0.005em; }
  .h3 { font: var(--nn-h3); }
  .h4 { font: var(--nn-h4); }
</style>
</head>
<body>
  <div class="row"><span class="tag">H1 · 28/800</span><div class="h1">Active in your radius</div></div>
  <div class="row"><span class="tag">H2 · 22/700</span><div class="h2">3 men nearby</div></div>
  <div class="row"><span class="tag">H3 · 18/700</span><div class="h3">Marcus, 32</div></div>
  <div class="row"><span class="tag">H4 · 16/600</span><div class="h4">About</div></div>
</body>
</html>
