<!doctype html>
<!-- @dsCard group="Colors" name="Text on background" subtitle="Text, muted, faint, copper foreground" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Text on background</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--nn-bg); }
  .panel { background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 16px; padding: 22px 26px; box-shadow: var(--nn-shadow-card); }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-top: 1px dashed var(--nn-border); }
  .row:first-of-type { border-top: none; }
  .swatch { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; align-self: center; border: 1px solid rgba(255,255,255,.04); }
  .label { font: var(--nn-overline); letter-spacing: 0.18em; min-width: 92px; }
  .sample { font: var(--nn-body); flex: 1; }
  .hex { font: var(--nn-mono); font-size: 11px; color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="panel">
    <div class="row">
      <span class="swatch" style="background:#F0E0C0"></span>
      <span class="label" style="color:#F0E0C0">TEXT</span>
      <span class="sample" style="color:#F0E0C0">Pulse for now. Match for later.</span>
      <span class="hex">#F0E0C0</span>
    </div>
    <div class="row">
      <span class="swatch" style="background:#A89070"></span>
      <span class="label" style="color:#A89070">MUTED</span>
      <span class="sample" style="color:#A89070">3 men nearby · 2 active in the last hour.</span>
      <span class="hex">#A89070</span>
    </div>
    <div class="row">
      <span class="swatch" style="background:#6B5840"></span>
      <span class="label" style="color:#6B5840">FAINT</span>
      <span class="sample" style="color:#6B5840">Disabled state · placeholder · timestamp</span>
      <span class="hex">#6B5840</span>
    </div>
    <div class="row">
      <span class="swatch" style="background:#C4832A"></span>
      <span class="label" style="color:#C4832A">COPPER</span>
      <span class="sample" style="color:#C4832A">See who liked you →</span>
      <span class="hex">#C4832A</span>
    </div>
  </div>
</body>
</html>
