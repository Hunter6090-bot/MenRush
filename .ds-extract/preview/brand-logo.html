<!doctype html>
<!-- @dsCard group="Brand" name="Logo lockups" subtitle="Medallion · wordmark copper · wordmark inverted" viewport="700x250" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px; background: var(--nn-bg); color: var(--nn-text); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .panel { background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 14px; padding: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: var(--nn-shadow-card); min-height: 200px; }
  .panel img { max-width: 100%; max-height: 140px; object-fit: contain; }
  .wordmark { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 30px; letter-spacing: 0.1em; color: var(--nn-copper); text-transform: uppercase; }
  .panel.dark { background: var(--nn-bg); }
  .panel.copper { background: var(--nn-copper); }
  .panel.copper .wordmark { color: #1A0E03; }
  .lbl { font: var(--nn-overline); font-size: 10px; letter-spacing: 0.18em; color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="panel dark">
    <img src="../assets/logo.png" alt="MenRush — primary logo">
    <span class="lbl">PRIMARY LOGO</span>
  </div>
  <div class="panel dark">
    <div class="wordmark">MENRUSH</div>
    <span class="lbl">WORDMARK · COPPER</span>
  </div>
  <div class="panel copper">
    <div class="wordmark">MENRUSH</div>
    <span class="lbl" style="color: rgba(26,14,3,.6)">WORDMARK · INVERTED</span>
  </div>
</body>
</html>
