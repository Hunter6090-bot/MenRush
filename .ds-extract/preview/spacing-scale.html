<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base · 1–16 steps" viewport="700x330" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--nn-bg); color: var(--nn-text); }
  .panel { background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 16px; padding: 18px 22px; }
  .row { display: grid; grid-template-columns: 64px 1fr 88px; align-items: center; gap: 14px; padding: 7px 0; }
  .name { font: var(--nn-overline); letter-spacing: 0.18em; }
  .bar { height: 14px; background: var(--nn-copper); border-radius: 4px; box-shadow: 0 0 12px rgba(196,131,42,.3); }
  .val { font: var(--nn-mono); font-size: 11px; color: var(--nn-muted); text-align: right; }
</style>
</head>
<body>
  <div class="panel">
    <div class="row"><span class="name">space-1</span><div class="bar" style="width:4px"></div><span class="val">4 / 0.25rem</span></div>
    <div class="row"><span class="name">space-2</span><div class="bar" style="width:8px"></div><span class="val">8 / 0.5rem</span></div>
    <div class="row"><span class="name">space-3</span><div class="bar" style="width:12px"></div><span class="val">12 / 0.75rem</span></div>
    <div class="row"><span class="name">space-4</span><div class="bar" style="width:16px"></div><span class="val">16 / 1rem</span></div>
    <div class="row"><span class="name">space-6</span><div class="bar" style="width:24px"></div><span class="val">24 / 1.5rem</span></div>
    <div class="row"><span class="name">space-8</span><div class="bar" style="width:32px"></div><span class="val">32 / 2rem</span></div>
    <div class="row"><span class="name">space-12</span><div class="bar" style="width:48px"></div><span class="val">48 / 3rem</span></div>
    <div class="row"><span class="name">space-16</span><div class="bar" style="width:64px"></div><span class="val">64 / 4rem</span></div>
  </div>
</body>
</html>
