<!doctype html>
<!-- @dsCard group="Brand" name="App icon" subtitle="Square icon at 1024, 512, 192, 180, 32" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>App icon sizes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--nn-bg); color: var(--nn-text); display: flex; gap: 22px; align-items: flex-end; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .icon { display: block; border-radius: 22%; overflow: hidden; box-shadow: var(--nn-shadow-card), var(--nn-inset-warm); border: 1px solid rgba(196,131,42,.15); background: var(--nn-bg); }
  .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lbl { font: var(--nn-mono); font-size: 10px; color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="col"><div class="icon" style="width:120px; height:120px"><img src="../assets/logo.png"></div><span class="lbl">1024 / 120@1×</span></div>
  <div class="col"><div class="icon" style="width:88px;  height:88px" ><img src="../assets/logo.png"></div><span class="lbl">512 / 88</span></div>
  <div class="col"><div class="icon" style="width:60px;  height:60px" ><img src="../assets/logo.png"></div><span class="lbl">192 / 60</span></div>
  <div class="col"><div class="icon" style="width:44px;  height:44px" ><img src="../assets/logo.png"></div><span class="lbl">180 / 44</span></div>
  <div class="col"><div class="icon" style="width:32px;  height:32px" ><img src="../assets/logo.png"></div><span class="lbl">32 / 32</span></div>
</body>
</html>
