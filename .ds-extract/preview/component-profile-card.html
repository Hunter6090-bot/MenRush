<!doctype html>
<!-- @dsCard group="Components" name="Profile cards" subtitle="Discover-grid card — three states" viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Profile card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px; background: var(--nn-bg); color: var(--nn-text); display: flex; gap: 18px; justify-content: center; }
  .card { width: 220px; background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 16px; overflow: hidden; box-shadow: var(--nn-shadow-card), var(--nn-inset-warm); display: flex; flex-direction: column; }
  .photo { aspect-ratio: 3/4; background: linear-gradient(160deg, #3D2B0E, #1E1508 70%); position: relative; }
  .photo::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--nn-card) 0%, transparent 45%); }
  .silh { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(196,131,42,.12); }
  .silh svg { width: 80px; height: 80px; }
  .badge-row { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 2; }
  .badge { padding: 4px 9px; border-radius: 999px; font: var(--nn-caption); font-size: 10.5px; backdrop-filter: blur(8px); display: inline-flex; gap: 5px; align-items: center; }
  .on { background: rgba(13,10,6,.65); color: #8FC773; border: 1px solid rgba(111,168,90,.4); }
  .on .d { width: 6px; height: 6px; border-radius: 50%; background: #6FA85A; box-shadow: 0 0 8px #6FA85A; }
  .dist { background: rgba(13,10,6,.65); color: var(--nn-text); border: 1px solid var(--nn-border); }
  .v-corner { position: absolute; bottom: 78px; right: 10px; width: 26px; height: 26px; border-radius: 50%; background: var(--nn-copper); border: 2px solid var(--nn-card); display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: var(--nn-glow-copper); }
  .v-corner svg { width: 13px; height: 13px; color: #1A0E03; }
  .body { padding: 12px 14px 14px; }
  .name { font: var(--nn-h4); font-size: 15px; }
  .age { color: var(--nn-muted); font-weight: 400; margin-left: 4px; }
  .bio { font: var(--nn-body-sm); color: var(--nn-muted); margin-top: 4px; line-height: 1.4; }
  .tribes { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .t { font: var(--nn-caption); font-size: 10px; padding: 3px 8px; border-radius: 999px; background: rgba(196,131,42,.1); color: var(--nn-copper); border: 1px solid rgba(196,131,42,.25); }
</style>
</head>
<body>
  <div class="card">
    <div class="photo">
      <div class="badge-row">
        <span class="badge on"><span class="d"></span>Active</span>
        <span class="badge dist">◯ 0.4 mi</span>
      </div>
      <div class="silh"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
      <div class="v-corner"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg></div>
    </div>
    <div class="body">
      <div class="name">Marcus<span class="age">32</span></div>
      <div class="bio">Cigar bar regular. East Village. Top.</div>
      <div class="tribes"><span class="t">Bear</span><span class="t">Leather</span><span class="t">+2</span></div>
    </div>
  </div>

  <div class="card">
    <div class="photo">
      <div class="badge-row">
        <span class="badge" style="background:rgba(13,10,6,.65); color:var(--nn-muted); border:1px solid var(--nn-border);">Last 1h</span>
        <span class="badge dist">◯ 1.3 mi</span>
      </div>
      <div class="silh"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
    </div>
    <div class="body">
      <div class="name">Dane<span class="age">28</span></div>
      <div class="bio">New in town. Looking for tonight.</div>
      <div class="tribes"><span class="t">Jock</span><span class="t">Otter</span></div>
    </div>
  </div>

  <div class="card">
    <div class="photo">
      <div class="badge-row">
        <span class="badge" style="background:rgba(196,131,42,.85); color:#1A0E03; border:0; font-weight:700">● PULSING</span>
        <span class="badge dist">◯ 800 m</span>
      </div>
      <div class="silh"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
      <div class="v-corner"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg></div>
    </div>
    <div class="body">
      <div class="name">Reyes<span class="age">41</span></div>
      <div class="bio">Daddy. Industrial. No timewasters.</div>
      <div class="tribes"><span class="t">Daddy</span><span class="t">Leather</span></div>
    </div>
  </div>
</body>
</html>
