<!doctype html>
<!-- @dsCard group="Type" name="Body & caption" subtitle="Body LG / body / small / caption" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Body & caption</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--nn-bg); color: var(--nn-text); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 12px 0; border-top: 1px dashed var(--nn-border); }
  .row:first-of-type { border-top: none; }
  .tag { font: var(--nn-mono); font-size: 11px; color: var(--nn-muted); min-width: 84px; }
  .body-lg { font: var(--nn-body-lg); }
  .body    { font: var(--nn-body); }
  .body-sm { font: var(--nn-body-sm); color: var(--nn-muted); }
  .cap     { font: var(--nn-caption); color: var(--nn-muted); }
</style>
</head>
<body>
  <div class="row"><span class="tag">17/400</span><div class="body-lg">No waiting. No swiping. Just men nearby.</div></div>
  <div class="row"><span class="tag">15/400</span><div class="body">Tap an avatar to open their profile. Open chat from the drawer — no match required.</div></div>
  <div class="row"><span class="tag">13/400</span><div class="body-sm">Last seen 12m ago · 1.3 mi away · verified</div></div>
  <div class="row"><span class="tag">11/500</span><div class="cap">PROFILE · LAST UPDATED 3 DAYS AGO</div></div>
</body>
</html>
