<!doctype html>
<!-- @dsCard group="Components" name="Mood + tribe sheet" subtitle="Mood = radio rows (single) · Tribes + ethnicity = chip clouds (multi)" viewport="700x860" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mood + tribe picker sheet</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--nn-bg); color: var(--nn-text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; }
  .sheet { width: 360px; background: var(--nn-card); border-top-left-radius: 22px; border-top-right-radius: 22px; border-top: 1px solid var(--nn-border); padding: 14px 18px 22px; box-shadow: 0 -24px 64px rgba(0,0,0,.7); }
  .handle { width: 36px; height: 4px; border-radius: 2px; background: var(--nn-border); margin: 0 auto 14px; }
  h3 { margin: 0 0 4px; font-size: 16px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  h3 .cancel { font-size: 12px; font-weight: 500; color: var(--nn-muted); text-transform: none; letter-spacing: 0; }

  .section-head { display: flex; justify-content: space-between; align-items: baseline; margin: 18px 0 10px; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--nn-muted); }
  .hint { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; color: var(--nn-faint); }
  .counter { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
             background: rgba(196,131,42,.12); color: var(--nn-copper);
             border: 1px solid rgba(196,131,42,.35); letter-spacing: 0.04em; }
  .counter.full { background: var(--nn-copper); color: #1A0E03; border-color: transparent; }

  /* ── Mood — radio rows ───────────────────────────── */
  .moods { display: flex; flex-direction: column; gap: 6px; }
  .mood {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--nn-border); background: transparent;
    cursor: pointer;
  }
  .mood.on {
    background: rgba(196,131,42,.10);
    border-color: rgba(196,131,42,.35);
    box-shadow: inset 0 0 24px rgba(196,131,42,.06);
  }
  .radio {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--nn-faint);
    display: flex; align-items: center; justify-content: center;
  }
  .mood.on .radio { border-color: var(--nn-copper); }
  .radio .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: transparent; transform: scale(0); transition: transform .2s;
  }
  .mood.on .radio .dot { background: var(--nn-copper); transform: scale(1); box-shadow: 0 0 8px var(--nn-copper); }
  .mood-lbl { font-size: 14px; font-weight: 500; color: var(--nn-muted); }
  .mood.on .mood-lbl { color: var(--nn-text); font-weight: 700; }

  /* ── Tribes — chip cloud with ✓ ─────────────────── */
  .tribes { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; gap: 5px; align-items: center;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(196,131,42,.06); color: var(--nn-text);
    border: 1px solid var(--nn-border);
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .chip.on {
    background: var(--nn-copper); color: #1A0E03;
    border-color: transparent; font-weight: 700;
    box-shadow: 0 0 14px rgba(196,131,42,.35);
    padding-left: 9px;
  }
  .chip .tick {
    width: 14px; height: 14px; border-radius: 50%;
    background: #1A0E03; color: var(--nn-copper);
    display: inline-flex; align-items: center; justify-content: center;
  }

  .cta { width: 100%; padding: 14px; background: var(--nn-copper); color: #1A0E03;
         border-radius: 12px; font-weight: 800; letter-spacing: 0.14em;
         text-align: center; text-transform: uppercase; font-size: 13px;
         box-shadow: 0 0 24px rgba(196,131,42,.4); margin-top: 18px; }
</style>
</head>
<body>
  <div class="sheet">
    <div class="handle"></div>
    <h3>YOU <span class="cancel">Cancel</span></h3>

    <div class="section-head">
      <span class="lbl">HERE FOR</span>
      <span class="hint">PICK ONE</span>
    </div>
    <div class="moods">
      <div class="mood on">
        <span class="radio"><span class="dot"></span></span>
        <span class="mood-lbl">NSA</span>
      </div>
      <div class="mood">
        <span class="radio"><span class="dot"></span></span>
        <span class="mood-lbl">Hookup</span>
      </div>
      <div class="mood">
        <span class="radio"><span class="dot"></span></span>
        <span class="mood-lbl">Date</span>
      </div>
      <div class="mood">
        <span class="radio"><span class="dot"></span></span>
        <span class="mood-lbl">Drinks</span>
      </div>
      <div class="mood">
        <span class="radio"><span class="dot"></span></span>
        <span class="mood-lbl">Chat</span>
      </div>
    </div>

    <div class="section-head">
      <span class="lbl">TRIBES</span>
      <span class="counter">2 of 4 selected</span>
    </div>
    <div class="tribes">
      <span class="chip on"><span class="tick">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </span>Bear</span>
      <span class="chip">Cub</span>
      <span class="chip">Daddy</span>
      <span class="chip">Jock</span>
      <span class="chip on"><span class="tick">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </span>Leather</span>
      <span class="chip">Otter</span>
      <span class="chip">Twink</span>
      <span class="chip">Wolf</span>
      <span class="chip">Geek</span>
      <span class="chip">Punk</span>
      <span class="chip">Sub</span>
      <span class="chip">Top</span>
    </div>

    <div class="section-head">
      <span class="lbl">ETHNICITY</span>
      <span class="hint">OPTIONAL</span>
    </div>
    <div class="tribes">
      <span class="chip on"><span class="tick">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </span>Asian</span>
      <span class="chip">Black</span>
      <span class="chip">Latino</span>
      <span class="chip on"><span class="tick">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </span>Middle Eastern</span>
      <span class="chip">Mixed</span>
      <span class="chip">Native American</span>
      <span class="chip">South Asian</span>
      <span class="chip">White</span>
      <span class="chip">Other</span>
    </div>

    <div class="cta">SAVE</div>
  </div>
</body>
</html>
