<!doctype html>
<!-- @dsCard group="Components" name="Avatar states" subtitle="Pulsing · online · offline · silhouette — all members are ID-verified" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Avatar + pulse</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--nn-bg); color: var(--nn-text); display: flex; gap: 28px; align-items: center; justify-content: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .lbl { font: var(--nn-overline); letter-spacing: 0.16em; font-size: 9.5px; color: var(--nn-muted); }
  .ring { position: relative; width: 88px; height: 88px; display: flex; align-items: center; justify-content: center; }
  .pulse-ring { position: absolute; inset: 0; border-radius: 50%; background: var(--nn-copper); opacity: .55; animation: nn-radar 2.4s var(--nn-ease-out) infinite; }
  .pulse-ring.r2 { animation-delay: .8s; opacity: .35; }
  .pulse-ring.r3 { animation-delay: 1.6s; opacity: .2; }
  .av { position: relative; z-index: 2; width: 64px; height: 64px; border-radius: 50%; overflow: hidden; border: 2px solid var(--nn-copper); background: var(--nn-elevated); display:flex; align-items: center; justify-content: center; font: var(--nn-h3); color: var(--nn-text); box-shadow: 0 0 0 3px rgba(196,131,42,.18), var(--nn-shadow-card); }
  .silhouette { background: linear-gradient(160deg, #2A1C0A, #1E1508); color: var(--nn-faint); }
  .av.offline { border-color: var(--nn-border); box-shadow: var(--nn-shadow-card); color: var(--nn-muted); }
  .online-dot { position: absolute; bottom: 0; right: 6px; width: 16px; height: 16px; border-radius: 50%; background: #6FA85A; box-shadow: 0 0 10px #6FA85A; border: 2.5px solid var(--nn-bg); z-index: 3; }
</style>
</head>
<body>
  <div class="col">
    <div class="ring">
      <span class="pulse-ring"></span>
      <span class="pulse-ring r2"></span>
      <span class="pulse-ring r3"></span>
      <div class="av">M</div>
    </div>
    <span class="lbl">PULSING · ACTIVE</span>
  </div>
  <div class="col">
    <div class="ring">
      <div class="av">
        D
        <span class="online-dot"></span>
      </div>
    </div>
    <span class="lbl">ONLINE</span>
  </div>
  <div class="col">
    <div class="ring">
      <div class="av offline">R</div>
    </div>
    <span class="lbl">OFFLINE</span>
  </div>
  <div class="col">
    <div class="ring">
      <div class="av silhouette">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      </div>
    </div>
    <span class="lbl">SILHOUETTE</span>
  </div>
</body>
</html>
