<!doctype html>
<!-- @dsCard group="Components" name="Boost active" subtitle="Post-payment confirmation with pulsing core + 30-min timer" viewport="700x480" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Boost active</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px; background: var(--nn-bg); color: var(--nn-text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; }
  .card { width: 320px; background: var(--nn-card); border: 1px solid rgba(196,131,42,.5); border-radius: 20px; padding: 26px 22px; text-align: center; box-shadow: 0 0 50px rgba(196,131,42,.2), 0 16px 48px rgba(0,0,0,.6); }
  .glyph-wrap { position: relative; width: 88px; height: 88px; margin: 0 auto 14px; }
  .ring { position: absolute; inset: 22px; border-radius: 50%; background: var(--nn-copper); }
  .ring.r1 { opacity: .5; animation: nn-radar 2.4s cubic-bezier(.16,1,.3,1) infinite; }
  .ring.r2 { opacity: .3; animation: nn-radar 2.4s cubic-bezier(.16,1,.3,1) .8s infinite; }
  .core { position: absolute; inset: 22px; border-radius: 50%; background: radial-gradient(circle at 30% 25%, #E0A14A, var(--nn-copper)); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(196,131,42,.7), inset 0 1px 0 rgba(255,220,170,.4); color: #1A0E03; z-index: 2; }
  .eb { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; color: var(--nn-copper); }
  .ti { font-size: 18px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; margin: 7px 0 6px; }
  .sb { font-size: 12.5px; color: var(--nn-muted); line-height: 1.5; margin: 0 0 16px; }
  .timer { background: var(--nn-elevated); border: 1px solid var(--nn-border); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
  .timer-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--nn-muted); }
  .timer-val { font-family: ui-monospace, monospace; font-size: 26px; font-weight: 700; color: var(--nn-copper); margin-top: 2px; }
  .cta { width: 100%; padding: 12px; border: 1px solid var(--nn-copper); border-radius: 10px; background: transparent; color: var(--nn-copper); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; font-size: 13px; }
</style>
</head>
<body>
  <div class="card">
    <div class="glyph-wrap">
      <span class="ring r1"></span>
      <span class="ring r2"></span>
      <div class="core">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="10"/></svg>
      </div>
    </div>
    <div class="eb">BOOSTED</div>
    <h2 class="ti">Boost active.</h2>
    <p class="sb">Your profile jumps ahead of non-boosted men in your radius for the next 30 minutes.</p>
    <div class="timer">
      <div class="timer-lbl">REMAINING</div>
      <div class="timer-val">29:48</div>
    </div>
    <div class="cta">Got it</div>
  </div>
</body>
</html>
