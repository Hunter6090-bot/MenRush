<!doctype html>
<!-- @dsCard group="Colors" name="Brand palette" subtitle="8 core tokens — bg, surfaces, copper, rust, text" viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--nn-bg); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .sw  { aspect-ratio: 1.15 / 1; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between;
         border: 1px solid var(--nn-border); box-shadow: var(--nn-shadow-card), var(--nn-inset-warm); position: relative; overflow: hidden; }
  .name { font: var(--nn-overline); letter-spacing: 0.18em; text-transform: uppercase; color: var(--nn-text); opacity: .95; }
  .hex  { font: var(--nn-mono); color: rgba(240,224,192,.7); font-size: 12px; }
  .var  { font: var(--nn-mono); color: rgba(240,224,192,.45); font-size: 11px; }
  .sw.dark .name, .sw.dark .hex, .sw.dark .var { color: var(--nn-text); }
  .sw.dark .hex { color: rgba(240,224,192,.7); }
  .sw.dark .var { color: rgba(240,224,192,.45); }
  .copper-glow { box-shadow: var(--nn-shadow-card), var(--nn-glow-copper); border-color: rgba(196,131,42,0.4); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background: #0D0A06;">
      <div><div class="name">bg</div></div>
      <div><div class="hex">#0D0A06</div><div class="var">--nn-bg</div></div>
    </div>
    <div class="sw dark" style="background: #1E1508;">
      <div><div class="name">card</div></div>
      <div><div class="hex">#1E1508</div><div class="var">--nn-card</div></div>
    </div>
    <div class="sw dark" style="background: #2A1C0A;">
      <div><div class="name">elevated</div></div>
      <div><div class="hex">#2A1C0A</div><div class="var">--nn-elevated</div></div>
    </div>
    <div class="sw dark" style="background: #3D2B0E;">
      <div><div class="name">border</div></div>
      <div><div class="hex">#3D2B0E</div><div class="var">--nn-border</div></div>
    </div>
    <div class="sw copper-glow" style="background: #C4832A; color: #1A0E03;">
      <div><div class="name" style="color:#1A0E03">copper</div></div>
      <div><div class="hex" style="color:rgba(26,14,3,.7)">#C4832A</div><div class="var" style="color:rgba(26,14,3,.5)">--nn-copper</div></div>
    </div>
    <div class="sw" style="background: #8B4513; color: var(--nn-text);">
      <div><div class="name">rust</div></div>
      <div><div class="hex">#8B4513</div><div class="var">--nn-rust</div></div>
    </div>
    <div class="sw dark" style="background: #1E1508;">
      <div><div class="name" style="color:#F0E0C0">text</div></div>
      <div><div class="hex" style="color:#F0E0C0">#F0E0C0</div><div class="var">--nn-text</div></div>
      <div style="position:absolute; right:14px; top:14px; width:36px; height:36px; border-radius:50%; background:#F0E0C0;"></div>
    </div>
    <div class="sw dark" style="background: #1E1508;">
      <div><div class="name" style="color:#A89070">muted</div></div>
      <div><div class="hex" style="color:#A89070">#A89070</div><div class="var">--nn-muted</div></div>
      <div style="position:absolute; right:14px; top:14px; width:36px; height:36px; border-radius:50%; background:#A89070;"></div>
    </div>
  </div>
</body>
</html>
