<!doctype html>
<!-- @dsCard group="Type" name="Display type — Inter 900" subtitle="Inter 900 all-caps wide-tracked — wordmark, hero, section openers" viewport="700x290" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display — Inter 900</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--nn-bg); }
  .specimen { color: var(--nn-text); font-family: 'Inter', sans-serif; }
  .xl  { font-weight: 900; font-size: 52px; line-height: 1; letter-spacing: 0.06em; text-transform: uppercase; }
  .lg  { font-weight: 900; font-size: 32px; line-height: 1.05; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 10px; }
  .md  { font-weight: 900; font-size: 22px; line-height: 1.1;  letter-spacing: 0.1em;  text-transform: uppercase; margin-top: 6px; color: var(--nn-copper); }
  .meta { font: var(--nn-caption); color: var(--nn-muted); margin-top: 14px; letter-spacing: 0; text-transform: none; font-family: 'Inter', sans-serif; }
  .meta b { color: var(--nn-text); font-weight: 600; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="xl">MENRUSH</div>
    <div class="lg">Pulse for now.</div>
    <div class="md">Match for later</div>
    <div class="meta"><b>Inter 900</b> · single face, all-caps for display · tracking <b>0.06–0.10em</b> · used for wordmark, hero, section openers, premium-gate hero. Hierarchy from <b>weight + size</b>, never a second font.</div>
  </div>
</body>
</html>
