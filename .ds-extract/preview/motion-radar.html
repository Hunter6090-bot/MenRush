<!doctype html>
<!-- @dsCard group="Brand" name="Radar pulse motion" subtitle="The signature animation — copper rings, 2.4s loop" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radar pulse motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px; background: var(--nn-bg); color: var(--nn-text); display: flex; align-items: center; gap: 30px; }
  .stage { width: 220px; height: 220px; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stage::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; background: url('../assets/menrush-logo.png'); background-size: cover; opacity: .14; filter: blur(1px); }
  .ring { position: absolute; width: 64px; height: 64px; border-radius: 50%; background: var(--nn-copper); }
  .r1 { opacity: .55; animation: nn-radar 2.4s var(--nn-ease-out) infinite; }
  .r2 { opacity: .38; animation: nn-radar 2.4s var(--nn-ease-out) .8s infinite; }
  .r3 { opacity: .22; animation: nn-radar 2.4s var(--nn-ease-out) 1.6s infinite; }
  .core { width: 22px; height: 22px; border-radius: 50%; background: var(--nn-copper); box-shadow: 0 0 22px rgba(196,131,42,.7), inset 0 1px 0 rgba(255,220,170,.5); z-index: 2; border: 2px solid var(--nn-text); }
  .info { flex: 1; }
  .info h3 { font: var(--nn-display-md); text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 8px; }
  .info p { font: var(--nn-body-sm); color: var(--nn-muted); margin: 0 0 8px; line-height: 1.5; }
  .info code { font: var(--nn-mono); color: var(--nn-copper); font-size: 12px; }
  .ovr { font: var(--nn-overline); letter-spacing: 0.18em; color: var(--nn-copper); font-size: 10px; }
</style>
</head>
<body>
  <div class="stage">
    <span class="ring r1"></span>
    <span class="ring r2"></span>
    <span class="ring r3"></span>
    <span class="core"></span>
  </div>
  <div class="info">
    <span class="ovr">SIGNATURE MOTION</span>
    <h3>Radar pulse</h3>
    <p>Three concentric copper rings. Each scales 1 → 3.5, fades 0.6 → 0, over <code>2.4s</code> with <code>0.8s</code> stagger.</p>
    <p>Used on the PulseFab, active-now avatars, location pins, "searching" empty states. <strong>Never decorative</strong> — only signals presence.</p>
  </div>
</body>
</html>
