<!doctype html>
<!-- @dsCard group="UI Kit — Menrush App" name="MenRush mobile UI kit" subtitle="Grouped switcher: App · Rooms · Auth · Verify · Premium · Modals" viewport="1200x1200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>MenRush — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background:
    radial-gradient(circle at 50% 0%, #1A1106 0%, #0D0A06 60%) fixed;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--nn-text);
  }
  body { display: flex; flex-direction: column; align-items: center; padding: 30px 16px 80px; gap: 20px; }
  .header { text-align: center; max-width: 540px; }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.24em; color: var(--nn-copper); }
  .header h1 {
    font-family: 'Inter', sans-serif; font-weight: 900; font-size: 32px;
    text-transform: uppercase; letter-spacing: 0.08em; margin: 8px 0 6px;
  }
  .header p { font-size: 14px; color: var(--nn-muted); margin: 0; line-height: 1.5; }

  .switchers { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .switcher { display: flex; gap: 4px; padding: 4px; border-radius: 999px;
              background: var(--nn-card); border: 1px solid var(--nn-border); flex-wrap: wrap; justify-content: center; }
  .switcher.cat button { padding: 8px 16px; }
  .switcher button {
    padding: 7px 14px; border-radius: 999px; border: 0; cursor: pointer;
    background: transparent; color: var(--nn-muted);
    font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .switcher button:hover { color: var(--nn-text); }
  .switcher button.active { background: var(--nn-copper); color: #1A0E03; }
  .stage { display: flex; gap: 22px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .caption {
    width: 402px; max-width: 100%;
    background: var(--nn-card); border: 1px solid var(--nn-border); border-radius: 14px;
    padding: 14px 18px; box-shadow: var(--nn-shadow-card);
    text-align: left; font-size: 13px; line-height: 1.5;
  }
  .caption b { color: var(--nn-copper); font-weight: 600; }
  .caption .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--nn-muted); }
  .ios-app { position: relative; height: 100%; background: transparent; display: flex; flex-direction: column;
             padding-top: 50px; box-sizing: border-box; }
  .ios-content { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden;
                 background: var(--nn-bg); }
</style>
</head>
<body>
  <div class="header">
    <div class="eyebrow">UI KIT · MENRUSH</div>
    <h1>Pulse for now. Match for later.</h1>
    <p>Hi-fi mobile prototype. Pick a category, then a screen. The <b style="color:var(--nn-copper)">Live</b> tab is fully interactive.</p>
  </div>

  <div id="switcher-mount" class="switchers"></div>
  <div id="stage" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="modals.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="verify.jsx"></script>
  <script type="text/babel" src="rooms.jsx"></script>

  <script type="text/babel">
    // ── App: the fully-interactive prototype ───────────────
    function LiveApp() {
      const [tab, setTab] = React.useState('discover');
      const [radius, setRadius] = React.useState(5);
      const [pulsing, setPulsing] = React.useState(true);
      const [openedUser, setOpenedUser] = React.useState(null);
      const [chatUser, setChatUser] = React.useState(null);
      const [premium, setPremium] = React.useState(null); // null | variant key
      const [openRoom, setOpenRoom] = React.useState(null);
      const [moodOpen, setMoodOpen] = React.useState(false);
      const [boostOpen, setBoostOpen] = React.useState(false);
      const [videoUser, setVideoUser] = React.useState(null);

      const renderTab = () => {
        if (tab === 'discover') {
          return <DiscoverScreen
                    onOpenUser={(u) => setOpenedUser(u)}
                    onOpenPremium={() => setPremium('likes')}
                    onOpenFilters={() => setPremium('filters')}
                    radius={radius} setRadius={setRadius}
                    pulsing={pulsing} setPulsing={setPulsing} />;
        }
        if (tab === 'chat') {
          return <RoomsListScreen onOpenRoom={(r) => setOpenRoom(r)} onCreate={() => {}} />;
        }
        if (tab === 'matches') {
          return <PlaceholderTab label="Matches" hint="Mutual likes appear here. Tap to open chat." />;
        }
        if (tab === 'profile') {
          return <PlaceholderTab label="You" hint="Edit profile · Tribes / Mood · Verify ID · Settings" />;
        }
      };

      return (
        <div className="ios-app">
          <div className="ios-content">
            {renderTab()}
            <BottomNav active={tab} onSelect={setTab} unread={2} pulsing={pulsing} onPulse={() => setPulsing(p => !p)} />
            {openedUser && (
              <ProfileDrawer
                user={openedUser}
                onClose={() => setOpenedUser(null)}
                onOpenChat={(u) => { setOpenedUser(null); setChatUser(u); }}
                onVideoCall={(u) => { setOpenedUser(null); setVideoUser(u); }} />
            )}
            {chatUser && (
              <ChatScreen user={chatUser}
                onBack={() => setChatUser(null)}
                onOpenUser={(u) => setOpenedUser(u)} />
            )}
            {openRoom && (
              <RoomChatScreen room={openRoom}
                onBack={() => setOpenRoom(null)}
                onOpenMember={() => {}} />
            )}
            {premium && <PremiumGate variant={premium} onClose={() => setPremium(null)} />}
            {videoUser && <VideoCallModal user={videoUser} state="active" onClose={() => setVideoUser(null)} onHangup={() => setVideoUser(null)} />}
            {moodOpen && <MoodTribeSheet onClose={() => setMoodOpen(false)} onSave={() => setMoodOpen(false)} />}
            {boostOpen && <BoostConfirmModal onClose={() => setBoostOpen(false)} />}
          </div>
        </div>
      );
    }

    function PlaceholderTab({ label, hint }) {
      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, color: '#A89070', textAlign: 'center' }}>
          <div style={{ fontFamily: 'Inter, sans-serif', fontWeight: 900, fontSize: 24, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#F0E0C0' }}>{label}</div>
          <p style={{ fontSize: 13, marginTop: 8, maxWidth: 280 }}>{hint}</p>
        </div>
      );
    }

    // ── Static wrappers (frames that show a single screen at rest) ───────
    const wrap = (children) => <div className="ios-app"><div className="ios-content">{children}</div></div>;

    // Rooms mini-app — list ↔ room chat, fully interactive
    function RoomsDemo() {
      const [openRoom, setOpenRoom] = React.useState(null);
      return wrap(<>
        <RoomsListScreen onOpenRoom={(r) => setOpenRoom(r)} onCreate={()=>{}}/>
        <BottomNav active="chat" onSelect={()=>{}} unread={0}/>
        {openRoom && <RoomChatScreen room={openRoom} onBack={() => setOpenRoom(null)} onOpenMember={()=>{}}/>}
      </>);
    }

    const STATIC = {
      // ── App ────────────────────────────────────────
      discover: () => wrap(<>
        <DiscoverScreen onOpenUser={()=>{}} onOpenPremium={()=>{}} radius={5} setRadius={()=>{}} pulsing={true} setPulsing={()=>{}} />
        <BottomNav active="discover" onSelect={()=>{}} unread={2} pulsing={true}/>
      </>),
      profile: () => wrap(<>
        <DiscoverScreen onOpenUser={()=>{}} onOpenPremium={()=>{}} radius={5} setRadius={()=>{}} pulsing={true} setPulsing={()=>{}} />
        <BottomNav active="discover" onSelect={()=>{}} unread={2} pulsing={true}/>
        <ProfileDrawer user={MR_USERS[0]} onClose={()=>{}} onOpenChat={()=>{}}/>
      </>),
      chat: () => wrap(<ChatScreen user={MR_USERS[0]} onBack={()=>{}} onOpenUser={()=>{}}/>),
      'chat-premium': () => wrap(<ChatScreen premium user={MR_USERS[0]} onBack={()=>{}} onOpenUser={()=>{}}/>),

      // ── Rooms ──────────────────────────────────────
      'rooms-list': () => <RoomsDemo />,
      'rooms-chat': () => wrap(<RoomChatScreen room={MR_ROOMS[0]} onBack={()=>{}} onOpenMember={()=>{}}/>),

      // ── Auth ───────────────────────────────────────
      'auth-login':    () => wrap(<LoginScreen    onSubmit={()=>{}} onRegister={()=>{}} onForgot={()=>{}}/>),
      'auth-register': () => wrap(<RegisterScreen onSubmit={()=>{}} onSignIn={()=>{}}/>),
      'auth-forgot':   () => wrap(<ForgotScreen   onSubmit={()=>{}} onBack={()=>{}}/>),
      'auth-reset':    () => wrap(<ResetScreen    onSubmit={()=>{}} onBack={()=>{}}/>),

      // ── Verify ─────────────────────────────────────
      'verify-intro':    () => wrap(<VerifyFlow key="intro"    stage="intro"    onBack={()=>{}} onAdvance={()=>{}}/>),
      'verify-capture':  () => wrap(<VerifyFlow key="capture"  stage="capture"  onBack={()=>{}} onAdvance={()=>{}}/>),
      'verify-pending':  () => wrap(<VerifyFlow key="pending"  stage="pending"  onBack={()=>{}} onAdvance={()=>{}}/>),
      'verify-verified': () => wrap(<VerifyFlow key="verified" stage="verified" onBack={()=>{}} onAdvance={()=>{}}/>),

      // ── Premium gates ──────────────────────────────
      'premium-likes':     () => wrap(<>{disco()}<PremiumGate variant="likes"     onClose={()=>{}}/></>),
      'premium-boost':     () => wrap(<>{disco()}<PremiumGate variant="boost"     onClose={()=>{}}/></>),
      'premium-incognito': () => wrap(<>{disco()}<PremiumGate variant="incognito" onClose={()=>{}}/></>),
      'premium-radius':    () => wrap(<>{disco()}<PremiumGate variant="radius"    onClose={()=>{}}/></>),
      'premium-filters':   () => wrap(<>{disco()}<PremiumGate variant="filters"   onClose={()=>{}}/></>),

      // ── Modals & sheets ────────────────────────────
      'boost-confirm':    () => wrap(<>{disco()}<BoostConfirmModal onClose={()=>{}}/></>),
      'mood-tribe':       () => wrap(<>{disco()}<MoodTribeSheet onClose={()=>{}} onSave={()=>{}}/></>),
      'incognito-off':    () => wrap(<IncognitoScreen active={false} onBack={()=>{}}/>),
      'incognito-on':     () => wrap(<IncognitoScreen active={true}  onBack={()=>{}}/>),
      'video-incoming':   () => wrap(<><div style={{background:'#0D0A06',position:'absolute',inset:0}}/><VideoCallModal user={MR_USERS[0]} state="incoming" onClose={()=>{}} onAnswer={()=>{}} onHangup={()=>{}}/></>),
      'video-active':     () => wrap(<><div style={{background:'#0D0A06',position:'absolute',inset:0}}/><VideoCallModal user={MR_USERS[0]} state="active"   onClose={()=>{}} onHangup={()=>{}}/></>),
    };

    function disco() {
      return (
        <>
          <DiscoverScreen onOpenUser={()=>{}} onOpenPremium={()=>{}} radius={5} setRadius={()=>{}} pulsing={true} setPulsing={()=>{}} />
          <BottomNav active="discover" onSelect={()=>{}} unread={2} pulsing={true}/>
        </>
      );
    }

    // ── Catalog ─────────────────────────────────────
    const CATALOG = [
      { cat: 'App', screens: [
          { id: 'live',     label: 'Live · interactive', live: true, caption: <span><b>Click anywhere.</b> Tap an avatar → drawer → OPEN CHAT → thread. Tap the copper sparkle for the premium gate. Tap the Chat tab in bottom nav to enter Rooms. The center <b>Pulse</b> logo in the nav toggles visibility.</span> },
          { id: 'discover', label: 'Discover',  caption: <span>Mini-map + radar grid up top, range-ring selector, then a <b>2-column</b> grid of nearby users. Pulsing users get the copper-on-bronze badge.</span> },
          { id: 'profile',  label: 'Profile',   caption: <span>Bottom-sheet drawer with hero photo, identity row, bio, tribes + mood, stats grid, and a single <b>copper CTA</b> for OPEN CHAT.</span> },
          { id: 'chat',     label: 'Chat 1:1 · free',  caption: <span>1:1 thread, non-premium view. Voice notes play for everyone; the received <b>video note is blurred</b> with the MenRush mark and a note under the thread. Mic / video-record buttons and the video-call button open the premium gate.</span> },
          { id: 'chat-premium', label: 'Chat 1:1 · premium', caption: <span>Same thread as a <b>premium</b> member: video notes play, mic + video-record buttons append voice/video notes, and the video-call button starts a call.</span> },
      ]},
      { cat: 'Rooms', screens: [
          { id: 'rooms-list', label: 'Rooms list', caption: <span>Directory of nearby group chats — <b>interactive</b>: tap a room to open its thread, back arrow returns. Pulsing rooms have a copper count pill.</span> },
          { id: 'rooms-chat', label: 'Room chat',  caption: <span>Group thread. Sender name above the first message in a streak; avatar in the gutter; verified men show a ✓ next to the name.</span> },
      ]},
      { cat: 'Auth', screens: [
          { id: 'auth-login',    label: 'Sign in',         caption: <span>Auth shell = full-bleed photography slideshow (warm-grade rotation of editorial), 75% warm overlay, glass card centered. Single copper CTA.</span> },
          { id: 'auth-register', label: 'Create account',  caption: <span>Same shell. Inline 18+ confirmation under the form. Same single copper CTA, no social-login confetti.</span> },
          { id: 'auth-forgot',   label: 'Forgot password', caption: <span>Email-only reset. Terse copy. Quiet link back to sign-in.</span> },
          { id: 'auth-reset',    label: 'Reset password',  caption: <span>New + confirm. Live inline validation in copper/burnt-brick. CTA disabled until match.</span> },
      ]},
      { cat: 'Verify ID', screens: [
          { id: 'verify-intro',    label: 'Intro',    caption: <span><b>Free for all.</b> Eyebrow says it explicitly. Four trust rows. The badge is never a premium gate.</span> },
          { id: 'verify-capture',  label: 'Capture',  caption: <span>Viewfinder with corner-mark crop guides, front/back chip toggle, copper shutter ring. Tip line below.</span> },
          { id: 'verify-pending',  label: 'Pending',  caption: <span>Copper spinner + 4-step list. The active step glows copper with a soft pulse halo.</span> },
          { id: 'verify-verified', label: 'Verified', caption: <span>Copper checkmark with radar pulse. Badge preview shows where the checkmark lives on your card.</span> },
      ]},
      { cat: 'Premium gates', screens: [
          { id: 'premium-likes',     label: 'See likes',         caption: <span>The flagship paywall. <b>One pattern, five variants.</b> Single copper CTA, MenRush logo at 16% opacity, five clear perks.</span> },
          { id: 'premium-boost',     label: 'Boost',              caption: <span>Same pattern, different copy.</span> },
          { id: 'premium-incognito', label: 'Incognito',          caption: <span>Same pattern. Browse without being seen.</span> },
          { id: 'premium-radius',    label: 'Expanded radius',    caption: <span>Same pattern. Push discovery range to 30 miles.</span> },
          { id: 'premium-filters',   label: 'Advanced filters',   caption: <span>Same pattern. Narrow the grid by tribe, ethnicity, body, position, mood.</span> },
      ]},
      { cat: 'Modals & sheets', screens: [
          { id: 'boost-confirm',  label: 'Boost active',   caption: <span>Post-payment confirmation. Pulsing copper core glyph + remaining timer. Different from the gate.</span> },
          { id: 'mood-tribe',     label: 'Mood + Tribes',  caption: <span>Full bottom sheet. <b>Mood</b> = pick one. <b>Tribes</b> = pick up to 4 (live counter in copper).</span> },
          { id: 'incognito-off',  label: 'Incognito · off',caption: <span>Settings sub-page. Big toggle, hero glyph, four rule rows.</span> },
          { id: 'incognito-on',   label: 'Incognito · on', caption: <span>Same screen — copper-glowing core glyph + copper-bordered card. <b>"Invisible"</b> label.</span> },
          { id: 'video-incoming', label: 'Video · incoming', caption: <span>Full-bleed dark. Pulsing-avatar hero, hangup (red) + answer (green) buttons at the bottom.</span> },
          { id: 'video-active',   label: 'Video · active',   caption: <span>Their video full-bleed, my PiP top-right, 4-button control rack at the bottom.</span> },
      ]},
    ];

    function App() {
      const [cat, setCat] = React.useState('App');
      const cur = CATALOG.find(c => c.cat === cat);
      const [view, setView] = React.useState(cur.screens[0].id);

      React.useEffect(() => {
        const c = CATALOG.find(c => c.cat === cat);
        setView(c.screens[0].id);
      }, [cat]);

      const screen = cur.screens.find(s => s.id === view) || cur.screens[0];

      return (
        <React.Fragment>
          {ReactDOM.createPortal(
            <>
              <div className="switcher cat">
                {CATALOG.map(c => (
                  <button key={c.cat} className={cat === c.cat ? 'active' : ''} onClick={() => setCat(c.cat)}>{c.cat}</button>
                ))}
              </div>
              <div className="switcher">
                {cur.screens.map(s => (
                  <button key={s.id} className={view === s.id ? 'active' : ''} onClick={() => setView(s.id)}>{s.label}</button>
                ))}
              </div>
            </>,
            document.getElementById('switcher-mount')
          )}
          <IOSDevice width={402} height={874} dark={true}>
            {screen.live ? <LiveApp /> : STATIC[view] ? STATIC[view]() : null}
          </IOSDevice>
          <div className="caption">
            <div className="tag">{cat.toUpperCase()} · {screen.label.toUpperCase()}</div>
            <p style={{ margin: '4px 0 0' }}>{screen.caption}</p>
          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('stage'));
    root.render(<App />);
  </script>
</body>
</html>
