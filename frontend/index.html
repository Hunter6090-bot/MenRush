<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/menrush-logo-48.png" />
    <link rel="apple-touch-icon" href="/brand/menrush-logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C4832A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenRush" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MenRush — Pulse for now. Match for later.</title>
    <meta name="description" content="MenRush is a real-time location-based app for gay, bi, trans, discreet and curious men. Pulse for now, match for later, and see who's nearby right now." />
    <meta name="keywords" content="MenRush, gay dating app, men near me, location dating, LGBTQ app, real-time chat, nearby guys, pulse" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://menrush.com/" />
    <meta property="og:title" content="MenRush — Pulse for now. Match for later." />
    <meta property="og:description" content="See who's near you right now. Pulse for now. Match for later." />
    <meta property="og:image" content="/brand/menrush-social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MenRush logo" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MenRush — Pulse for now. Match for later." />
    <meta name="twitter:description" content="See who's near you right now. Pulse for now. Match for later." />
    <meta name="twitter:image" content="/brand/menrush-social-preview.png" />
    <meta name="twitter:image:alt" content="MenRush logo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var origin = location.origin;
        if (!origin || origin === 'null') return;
        var image = origin + '/brand/menrush-social-preview.png';
        var url = origin + '/';
        [
          ['meta[property="og:url"]', 'content', url],
          ['meta[property="og:image"]', 'content', image],
          ['meta[name="twitter:image"]', 'content', image],
        ].forEach(function (entry) {
          var el = document.querySelector(entry[0]);
          if (el) el.setAttribute(entry[1], entry[2]);
        });
      })();
    </script>
  </head>
  <body style="margin:0;background:#0D0A06;color:#F0E0C0;">
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;font-family:system-ui,sans-serif;text-align:center;">
        MenRush needs JavaScript enabled. Turn it on and reload.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
