<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Coin base gradient: deep bronze rim to warm centre -->
    <radialGradient id="coinBase" cx="50%" cy="42%" r="52%">
      <stop offset="0%"   stop-color="#C4832A"/>
      <stop offset="60%"  stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#3E1E05"/>
    </radialGradient>

    <!-- Rim highlight -->
    <radialGradient id="rimGrad" cx="50%" cy="50%" r="50%">
      <stop offset="80%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#F0A84070"/>
    </radialGradient>

    <!-- Inner shadow vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="65%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#00000055"/>
    </radialGradient>

    <!-- Clip to coin circle -->
    <clipPath id="coin">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>

    <!-- Silhouette highlight -->
    <linearGradient id="silhouetteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5C87A"/>
      <stop offset="100%" stop-color="#7A3A08"/>
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="25%"  stop-color="#F0A840"/>
      <stop offset="75%"  stop-color="#F0A840"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Outer rim ring -->
  <circle cx="256" cy="256" r="252" fill="#2A1200"/>
  <circle cx="256" cy="256" r="244" fill="#5A2800"/>
  <circle cx="256" cy="256" r="236" fill="url(#coinBase)"/>

  <!-- Vignette overlay -->
  <circle cx="256" cy="256" r="236" fill="url(#vignette)" clip-path="url(#coin)"/>

  <!-- Rim shimmer -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#rimGrad)" stroke-width="8"/>

  <!-- ── Left male silhouette (facing right) ── -->
  <g clip-path="url(#coin)" fill="url(#silhouetteGrad)">
    <!-- Head -->
    <ellipse cx="168" cy="148" rx="52" ry="60"/>
    <!-- Neck -->
    <rect x="148" y="200" width="40" height="32" rx="6"/>
    <!-- Jaw extension -->
    <path d="M130 175 Q120 195 148 210 L188 210 Q210 200 205 178 Q190 195 168 195 Q146 195 130 175Z"/>
    <!-- Shoulder / body -->
    <path d="M80 340 Q75 290 110 265 Q130 252 168 248 Q206 252 226 265 Q258 285 256 340Z"/>
    <!-- Beard (darker cutout shape to add mass) -->
    <path d="M138 185 Q135 210 150 225 Q163 235 185 228 Q200 218 202 200 Q192 212 168 212 Q148 213 138 185Z" fill="#7A3A08" opacity="0.6"/>
  </g>

  <!-- ── Right male silhouette (facing left, mirrored) ── -->
  <g clip-path="url(#coin)" fill="url(#silhouetteGrad)" transform="scale(-1,1) translate(-512,0)">
    <!-- Head -->
    <ellipse cx="168" cy="148" rx="52" ry="60"/>
    <!-- Neck -->
    <rect x="148" y="200" width="40" height="32" rx="6"/>
    <!-- Jaw extension -->
    <path d="M130 175 Q120 195 148 210 L188 210 Q210 200 205 178 Q190 195 168 195 Q146 195 130 175Z"/>
    <!-- Shoulder / body -->
    <path d="M80 340 Q75 290 110 265 Q130 252 168 248 Q206 252 226 265 Q258 285 256 340Z"/>
    <!-- Beard -->
    <path d="M138 185 Q135 210 150 225 Q163 235 185 228 Q200 218 202 200 Q192 212 168 212 Q148 213 138 185Z" fill="#7A3A08" opacity="0.6"/>
  </g>

  <!-- Horizontal divider lines above text -->
  <line x1="68" y1="358" x2="444" y2="358" stroke="url(#lineGrad)" stroke-width="2"/>
  <line x1="68" y1="365" x2="444" y2="365" stroke="url(#lineGrad)" stroke-width="1" opacity="0.4"/>

  <!-- MENRUSH wordmark -->
  <text
    x="256"
    y="430"
    text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-weight="900"
    letter-spacing="8"
    fill="#F0A840"
    paint-order="stroke"
    stroke="#3E1E05"
    stroke-width="4"
    stroke-linejoin="round"
  >MENRUSH</text>

  <!-- Subtle inner rim score line -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#00000030" stroke-width="1.5"/>
</svg>
